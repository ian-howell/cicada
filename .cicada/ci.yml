name: ci
image: golang:latest
on:
  - push
  - pull_request
steps:
  - name: vet
    commands:
      - go vet ./...
  - name: test
    commands:
      - go test ./...
    dependsOn:
      - vet
  - name: build
    commands:
      - go build -buildvcs=false -o /tmp/cicada ./cmd/cicada
    dependsOn:
      - test
