{{template "base.html" .}}
{{define "content"}}
<h2>Builds</h2>
<div id="builds-list" hx-get="/builds" hx-trigger="every 5s" hx-swap="outerHTML" hx-select="#builds-list">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Pipeline</th>
                <th>Ref</th>
                <th>Commit</th>
                <th>Status</th>
                <th>Created</th>
            </tr>
        </thead>
        <tbody>
        {{range .Builds}}
        <tr>
            <td><a href="/builds/{{.ID}}">{{shortID .ID}}</a></td>
            <td>{{.PipelineName}}</td>
            <td>{{.Ref}}</td>
            <td>{{shortSHA .CommitSHA}}</td>
            <td>{{.Status}}</td>
            <td>{{.CreatedAt.Format "2006-01-02 15:04:05"}}</td>
        </tr>
        {{else}}
        <tr><td colspan="6">No builds yet.</td></tr>
        {{end}}
        </tbody>
    </table>
</div>
{{end}}
